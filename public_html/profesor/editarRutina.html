<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../css/temaValk.css" rel="stylesheet" type="text/css"/>
        <link href="../css/bootstrap-icons.css" rel="stylesheet" type="text/css" />
        <title>Editar Rutina - Profesor</title>
    </head>

    <body class="">

        <nav class="navbar bg-dark bg-body-tertiary sticky-top" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand ms-2 d-flex align-items-center text-white text-decoration-none" href="rutina.html">
                    <img src="../static/arrow_back_ios_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Volver" class="me-2">
                    <span class="fs-5 fw-semibold"></span>
                </a>
            </div>
        </nav>

        <main class="mobile-wrapper mt-3 pb-5">

            <div class="text-center mb-4">
                <h4 class="text-white mb-0">Editar Rutina</h4>
                <p class="text-pink fw-semibold mb-0">12 Mayo • 18:00 hrs</p>
            </div>

            <div class="card bg-dark text-white mb-4 border border-secondary">
                <div class="card-body p-3">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold mb-1">NOMBRE DE LA RUTINA</label>
                        <input type="text" class="form-control bg-transparent text-white border-secondary" value="Funcional - Sala 1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold mb-1">FECHA DE LA RUTINA</label>
                        <input type="date" class="form-control bg-transparent text-white border-secondary" value="2026-05-12">
                    </div>
                    <div class="mb-0">
                        <label class="form-label text-secondary small fw-bold mb-1">PROFESORA ASIGNADA</label>
                        <select class="form-select bg-transparent text-white border-secondary">
                            <option value="camila" selected>Camila</option>
                            <option value="vale">Vale</option>
                            <option value="daniela">Daniela</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                <p class="text-white mb-0 fw-bold fs-5">Ejercicios</p>
            </div>

            <div id="contenedorEjercicios">
                <div class="card bg-dark text-white mb-3 border border-secondary shadow-sm tarjeta-ejercicio">
                    <div class="card-body p-3 position-relative">
                        <button type="button" class="btn btn-sm btn-outline-danger position-absolute top-0 end-0 m-2 border-0">
                            <i class="bi bi-trash fs-5"></i>
                        </button>
                        <div class="mb-3 mt-1 pe-4">
                            <label class="form-label text-secondary small mb-1">Nombre del ejercicio</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary fw-semibold" value="Sentadilla">
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label text-secondary small mb-1">Series x Reps</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary text-center" value="4 x 12">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary small mb-1">Peso Sugerido (kg)</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary text-center" value="60">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card bg-dark text-white mb-3 border border-secondary shadow-sm tarjeta-ejercicio">
                    <div class="card-body p-3 position-relative">
                        <button type="button" class="btn btn-sm btn-outline-danger position-absolute top-0 end-0 m-2 border-0">
                            <i class="bi bi-trash fs-5"></i>
                        </button>
                        <div class="mb-3 mt-1 pe-4">
                            <label class="form-label text-secondary small mb-1">Nombre del ejercicio</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary fw-semibold" value="Peso Muerto">
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label text-secondary small mb-1">Series x Reps</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary text-center" value="4 x 10">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary small mb-1">Peso Sugerido (kg)</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary text-center" value="70">
                            </div>
                        </div>
                    </div>
                </div>
            </div> 

            <button type="button" class="btn btn-outline-pink w-100 py-2 border-dashed mb-4 rounded-3">
                <i class="bi bi-plus-circle me-2"></i> Añadir otro ejercicio
            </button>

            <div class="text-center mt-2 mb-4">
                <a href="rutinas.html" class="btn text-white w-100 fw-bold py-3 rounded-pill shadow" style="background-color: #e91e63;">
                    GUARDAR CAMBIOS
                </a>
            </div>

        </main>

        <script src="../js/bootstrap.bundle.min.js"></script>
    </body>
</html>
